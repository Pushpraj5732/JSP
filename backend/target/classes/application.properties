# AYUSH Healthcare Management System - Application Properties

# Application Information
spring.application.name=AYUSH Healthcare Management System
app.version=1.0.0
app.description=Healthcare Management System for AYUSH hospitals in Anand

# Server Configuration
server.port=8080
server.servlet.context-path=/

# CORS Configuration
cors.allowed-origins=http://localhost:5173

# Jackson Configuration
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Kolkata

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.com.ayush=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Spring Boot DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
